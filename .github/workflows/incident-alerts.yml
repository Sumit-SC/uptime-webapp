name: Incident Alerts (Upptime Issues → Telegram)

on:
  issues:
    types: [opened, closed]

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
      - name: Filter Upptime issues
        id: filter
        run: |
          TITLE="${{ github.event.issue.title }}"

          if [[ "$TITLE" == *"is down"* ]] || [[ "$TITLE" == *"is up"* ]]; then
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if not relevant
        if: steps.filter.outputs.valid != 'true'
        run: exit 0

      - name: Build message
        id: build
        env:
          INCIDENT_BASE_URL: ${{ secrets.INCIDENT_BASE_URL }}
        run: |
          TITLE="${{ github.event.issue.title }}"
          NUMBER="${{ github.event.issue.number }}"

          INCIDENT_URL="$INCIDENT_BASE_URL/$NUMBER"

          # =========================
          # Determine status
          # =========================
          if [[ "$TITLE" == *"is down"* ]]; then
            STATUS="DOWN"
            ICON="🛑"
            ALERT="🚨 INCIDENT"
          else
            STATUS="RECOVERED"
            ICON="🟢"
            ALERT="✅ RESOLVED"
          fi

          # =========================
          # Clean site name
          # =========================
          SITE=$(echo "$TITLE" \
            | sed -E 's/\[.*\]//g' \
            | sed -E 's/^🟥 //; s/^🟩 //' \
            | sed -E 's/ is down.*//; s/ is up.*//' \
            | xargs)

          # =========================
          # Build message safely
          # =========================
          MSG=$(cat <<EOF
$ICON $ALERT

🌐 Site: $SITE
📡 Status: $STATUS
🔗 $INCIDENT_URL

🕒 $(TZ='Asia/Kolkata' date +"%d %b %Y | %I:%M %p IST")
EOF
)

          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Telegram
        run: |
          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.build.outputs.msg }}" \
            --argjson thread_id ${{ secrets.ALERTS_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: false
            }')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
