# ==========================================
# ADVANCED LATENCY ALERT SYSTEM
# ==========================================
#
# Detects:
# ✅ latency spikes
# ✅ degraded services
# ✅ persistent slowdowns
# ✅ recovery events
#
# Uses:
#   history/summary.json
#   history/*.yml
#
# Sends Telegram alerts with:
# ✅ severity ladder
# ✅ speed ladder
# ✅ adaptive thresholds
# ✅ performance insights
#
# ==========================================
# REQUIRED GITHUB SECRETS
# ==========================================
#
# STATUS_BASE_URL
#   Base URL for status history pages
#
# CHAT_ID
#   Telegram group/chat ID
#
# ALERTS_TOPIC_ID
#   Telegram topic/thread ID
#
# SUMMARY_BOT_TOKEN
#   Telegram bot token
#
# SUMMARY_TIMEZONE
#   Display timezone
#
# Example:
#   Asia/Kolkata
#   Asia/Tokyo
#   America/New_York
#   UTC
#
# ==========================================
# CRON NOTES
# ==========================================
#
# GitHub cron uses UTC only.
#
# "*/30 * * * *"
# = every 30 minutes
#
# Test mode:
# "*/5 * * * *"
#
# Cron helper:
# https://crontab.guru/
#
# ==========================================

name: Advanced Latency Alerts

on:

  # ========================================
  # Every 30 minutes
  # ========================================
  schedule:
    - cron: "*/30 * * * *"

  # ========================================
  # Manual trigger
  # ========================================
  workflow_dispatch:
    inputs:
      debug:
        description: "Force alerts for testing"
        required: false
        default: "false"

jobs:
  latency-check:
    runs-on: ubuntu-latest

    steps:

      # ====================================
      # Checkout repository
      # ====================================
      - uses: actions/checkout@v4

      # ====================================
      # Initialize persistent state
      # ====================================
      - name: Initialize state
        run: |
          mkdir -p history

          if [ ! -f history/latency-state.json ]; then
            echo "{}" > history/latency-state.json
          fi

      # ====================================
      # Analyze latency
      # ====================================
      - name: Analyze latency
        id: analyze

        env:
          STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}
          DEBUG_MODE: ${{ github.event.inputs.debug }}
          SUMMARY_TIMEZONE: ${{ secrets.SUMMARY_TIMEZONE }}

        run: |

          FILE="history/summary.json"
          STATE_FILE="history/latency-state.json"

          TMP_ALERT=$(mktemp)
          TMP_INSIGHT=$(mktemp)

          COUNT=$(jq length "$FILE")

          NOW=$(date +%s)

          ALERT_BLOCK=""
          RECOVERY_BLOCK=""
          INSIGHT_BLOCK=""

          # ==================================
          # Iterate monitored sites
          # ==================================

          for i in $(seq 0 $(($COUNT - 1))); do

            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            # Skip DOWN sites
            [ "$STATUS" != "up" ] && continue

            YML_FILE="history/$SLUG.yml"

            # Skip missing files
            [ ! -f "$YML_FILE" ] && continue

            CURRENT=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')

            # Skip invalid latency
            [ -z "$CURRENT" ] && continue

            # ==================================
            # Historical latency average
            # Uses last 10 entries
            # ==================================

            HISTORY=$(grep 'responseTime:' "$YML_FILE" \
              | awk '{print $2}' \
              | tail -n 10)

            SUM=0
            COUNT_H=0

            for val in $HISTORY; do
              if [[ "$val" =~ ^[0-9]+$ ]]; then
                SUM=$((SUM + val))
                COUNT_H=$((COUNT_H + 1))
              fi
            done

            [ "$COUNT_H" -eq 0 ] && continue

            AVG=$((SUM / COUNT_H))

            # ==================================
            # Deviation multiplier
            #
            # Example:
            # avg=100ms current=300ms
            # multiplier=300%
            # ==================================

            MULT=$((CURRENT * 100 / AVG))

            # ==================================
            # Severity ladder
            #
            # 🟢 Healthy
            # ⚠ Degraded
            # 🚨 Severe
            # 🛑 Critical
            # ==================================

            if [ "$CURRENT" -lt 500 ] && [ "$MULT" -lt 200 ]; then

              LEVEL="🟢"
              ALERT=0

            elif [ "$CURRENT" -lt 1000 ] || [ "$MULT" -lt 250 ]; then

              LEVEL="⚠"
              ALERT=0

            elif [ "$CURRENT" -lt 2500 ] || [ "$MULT" -lt 400 ]; then

              LEVEL="🚨"
              ALERT=1

            else

              LEVEL="🛑"
              ALERT=1

            fi

            # ==================================
            # Speed ladder
            #
            # ⚡ <100ms
            # 🚀 <250ms
            # ✈️ <500ms
            # 🏎️ <750ms
            # 🚗 <1000ms
            # 🏇 <1500ms
            # 🐢 <2000ms
            # 🐌 2000ms+
            # ==================================

            if [ "$CURRENT" -lt 100 ]; then
              SPEED="⚡"
            elif [ "$CURRENT" -lt 250 ]; then
              SPEED="🚀"
            elif [ "$CURRENT" -lt 500 ]; then
              SPEED="✈️"
            elif [ "$CURRENT" -lt 750 ]; then
              SPEED="🏎️"
            elif [ "$CURRENT" -lt 1000 ]; then
              SPEED="🚗"
            elif [ "$CURRENT" -lt 1500 ]; then
              SPEED="🏇"
            elif [ "$CURRENT" -lt 2000 ]; then
              SPEED="🐢"
            else
              SPEED="🐌"
            fi

            # ==================================
            # Debug mode
            #
            # Forces alerts >=200ms
            # Useful for testing
            # ==================================

            if [ "$DEBUG_MODE" = "true" ]; then

              if [ "$CURRENT" -ge 200 ]; then
                ALERT=1
                LEVEL="🧪"
              else
                ALERT=0
              fi

            fi

            # ==================================
            # Consecutive spike validation
            #
            # Require 2 consecutive bad checks
            # ==================================

            PREV_COUNT=$(jq -r ".\"$SLUG\".spikes // 0" "$STATE_FILE")

            if [ "$ALERT" -eq 1 ]; then
              SPIKES=$((PREV_COUNT + 1))
            else
              SPIKES=0
            fi

            jq \
              --arg slug "$SLUG" \
              --argjson spikes "$SPIKES" \
              '.[$slug].spikes = $spikes' \
              "$STATE_FILE" > tmp.json && mv tmp.json "$STATE_FILE"

            if [ "$SPIKES" -lt 2 ] && [ "$DEBUG_MODE" != "true" ]; then
              continue
            fi

            # ==================================
            # Cooldown logic
            #
            # 7200 sec = 2 hours
            #
            # Prevents repeated spam alerts
            # ==================================

            LAST_ALERT=$(jq -r ".\"$SLUG\".last_alert // 0" "$STATE_FILE")

            if [ "$DEBUG_MODE" != "true" ]; then
              if [ $((NOW - LAST_ALERT)) -lt 7200 ]; then
                continue
              fi
            fi

            # ==================================
            # Recovery detection
            # ==================================

            PREV_STATUS=$(jq -r ".\"$SLUG\".active // false" "$STATE_FILE")

            if [ "$ALERT" -eq 0 ] && [ "$PREV_STATUS" = "true" ]; then

              RECOVERY_BLOCK+="✅ Recovery Detected\n"
              RECOVERY_BLOCK+="🌐 $NAME\n"
              RECOVERY_BLOCK+="🚀 Current: $CURRENT ms\n"
              RECOVERY_BLOCK+="📊 Avg: $AVG ms\n"
              RECOVERY_BLOCK+="🔗 $STATUS_BASE_URL/$SLUG\n\n"

              jq \
                --arg slug "$SLUG" \
                '.[$slug].active = false' \
                "$STATE_FILE" > tmp.json && mv tmp.json "$STATE_FILE"

              continue
            fi

            # Skip healthy sites
            [ "$ALERT" -ne 1 ] && continue

            # ==================================
            # Save alert state
            # ==================================

            jq \
              --arg slug "$SLUG" \
              --argjson now "$NOW" \
              '.[$slug].last_alert = $now | .[$slug].active = true' \
              "$STATE_FILE" > tmp.json && mv tmp.json "$STATE_FILE"

            # ==================================
            # Store alerts
            # ==================================

            echo "$CURRENT|$LEVEL|$SPEED|$NAME|$SLUG|$AVG|$MULT" >> $TMP_ALERT

            # ==================================
            # Store insights
            # ==================================

            echo "$CURRENT|$NAME" >> $TMP_INSIGHT

          done

          # ==================================
          # Top 3 worst alerts
          # ==================================

          SORTED=$(sort -nr $TMP_ALERT | head -n 3)

          INDEX=1

          while IFS="|" read -r CUR LEVEL SPEED NAME SLUG AVG MULT; do

            [ -z "$CUR" ] && continue

            ALERT_BLOCK+="$INDEX. $LEVEL $NAME\n"
            ALERT_BLOCK+="   $SPEED $CUR ms\n"
            ALERT_BLOCK+="   📊 Avg: $AVG ms\n"
            ALERT_BLOCK+="   📈 Deviation: ${MULT}%\n"
            ALERT_BLOCK+="   🔗 $STATUS_BASE_URL/$SLUG\n\n"

            INDEX=$((INDEX+1))

          done <<< "$SORTED"

          # ==================================
          # Performance insights
          # ==================================

          INSIGHT_BLOCK="📊 Performance Insights\n\n"

          SORTED_INSIGHT=$(sort -nr $TMP_INSIGHT | head -n 3)

          while IFS="|" read -r LAT NAME; do

            [ -z "$LAT" ] && continue

            INSIGHT_BLOCK+="🌐 $NAME\n"
            INSIGHT_BLOCK+="⚡ $LAT ms\n\n"

          done <<< "$SORTED_INSIGHT"

          # ==================================
          # Final Telegram message
          # ==================================

          FINAL=""

          if [ -n "$ALERT_BLOCK" ]; then

            FINAL+="🚨 Critical Latency Alerts\n\n"
            FINAL+="$ALERT_BLOCK"
            FINAL+="━━━━━━━━━━━━━━━━━━\n\n"

          fi

          if [ -n "$RECOVERY_BLOCK" ]; then

            FINAL+="✅ Recovery Events\n\n"
            FINAL+="$RECOVERY_BLOCK"
            FINAL+="━━━━━━━━━━━━━━━━━━\n\n"

          fi

          FINAL+="$INSIGHT_BLOCK"

          LOCAL_TIME=$(TZ="$SUMMARY_TIMEZONE" date +"%d %b %Y | %I:%M %p %Z")
          UTC_TIME=$(TZ="UTC" date +"%H:%M UTC")

          FINAL+="🕒 $LOCAL_TIME\n"
          FINAL+="🌍 $UTC_TIME"

          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FINAL" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ====================================
      # Send Telegram alert
      # ====================================
      - name: Send Telegram
        run: |

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.analyze.outputs.msg }}" \
            --argjson thread_id ${{ secrets.ALERTS_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      # ====================================
      # Persist latency state
      # ====================================
      - name: Commit latency state
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add history/latency-state.json

          git diff --cached --quiet || git commit -m "Update latency state"

          git push