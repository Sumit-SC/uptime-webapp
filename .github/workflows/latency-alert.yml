name: Latency Spike Alerts (Smart)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  latency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Analyze latency
        id: analyze
        env:
          STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}
        run: |
          mkdir -p .cache

          FILE="history/summary.json"
          ALERTS=""

          COUNT=$(jq length "$FILE")

          for i in $(seq 0 $(($COUNT - 1))); do
            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            [ "$STATUS" != "up" ] && continue

            YML_FILE="history/$SLUG.yml"
            [ ! -f "$YML_FILE" ] && continue

            CURRENT=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')
            [ -z "$CURRENT" ] && continue

            # =============================
            # 🎯 LATENCY CLASSIFICATION
            # =============================
            if [ "$CURRENT" -lt 150 ]; then
              LEVEL="🟢 Normal"
              ALERT=0
            elif [ "$CURRENT" -lt 500 ]; then
              LEVEL="⚡ Slight Delay"
              ALERT=0
            elif [ "$CURRENT" -lt 1000 ]; then
              LEVEL="⚠ Moderate"
              ALERT=0
            elif [ "$CURRENT" -lt 2500 ]; then
              LEVEL="🚨 High Spike"
              ALERT=1
            else
              LEVEL="🛑 Severe Spike"
              ALERT=1
            fi

            [ "$ALERT" -ne 1 ] && continue

            # =============================
            # ⏳ COOLDOWN (2 HOURS)
            # =============================
            COOLDOWN_FILE=".cache/alert_$SLUG"
            NOW=$(date +%s)

            if [ -f "$COOLDOWN_FILE" ]; then
              LAST=$(cat "$COOLDOWN_FILE")
              if [ $((NOW - LAST)) -lt 7200 ]; then
                continue
              fi
            fi

            echo "$NOW" > "$COOLDOWN_FILE"

            # =============================
            # 📦 BUILD MESSAGE
            # =============================
            ALERTS+="$LEVEL\n"
            ALERTS+="🌐 $NAME\n"
            ALERTS+="⚡ $CURRENT ms\n"
            ALERTS+="🔗 $STATUS_BASE_URL/$SLUG\n\n"

          done

          if [ -n "$ALERTS" ]; then
            echo "alert=true" >> $GITHUB_OUTPUT
            echo "msg<<EOF" >> $GITHUB_OUTPUT
            echo -e "🚨 Latency Alert\n\n$ALERTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "alert=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram
        if: steps.analyze.outputs.alert == 'true'
        run: |
          MESSAGE="${{ steps.analyze.outputs.msg }}\n🕒 $(TZ='Asia/Kolkata' date +"%d %b %Y | %I:%M %p IST")"

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "$MESSAGE" \
            --argjson thread_id ${{ secrets.ALERTS_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
