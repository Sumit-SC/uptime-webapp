name: Latency Spike Alerts (Final Smart System)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      debug:
        description: "Force alerts"
        required: false
        default: "false"

jobs:
  latency-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Analyze latency
        id: analyze
        env:
          STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}
          INCIDENT_BASE_URL: ${{ secrets.INCIDENT_BASE_URL }}
          DEBUG_MODE: ${{ github.event.inputs.debug }}
        run: |
          mkdir -p .cache
          FILE="history/summary.json"

          TMP=$(mktemp)

          COUNT=$(jq length "$FILE")

          for i in $(seq 0 $(($COUNT - 1))); do
            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            [ "$STATUS" != "up" ] && continue

            YML_FILE="history/$SLUG.yml"
            [ ! -f "$YML_FILE" ] && continue

            CURRENT=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')
            [ -z "$CURRENT" ] && continue

            # =========================
            # 🎯 LATENCY LADDER
            # =========================
            if [ "$CURRENT" -lt 150 ]; then
              LEVEL="🟢 Normal"
              ALERT=0
            elif [ "$CURRENT" -lt 500 ]; then
              LEVEL="⚡ Slight"
              ALERT=0
            elif [ "$CURRENT" -lt 1000 ]; then
              LEVEL="⚠ Moderate"
              ALERT=0
            elif [ "$CURRENT" -lt 2500 ]; then
              LEVEL="🚨 High"
              ALERT=1
            else
              LEVEL="🛑 Severe"
              ALERT=1
            fi

            # debug override
            if [ "$DEBUG_MODE" = "true" ]; then
              ALERT=1
              LEVEL="🧪 Debug"
            fi

            [ "$ALERT" -ne 1 ] && continue

            # =========================
            # ⏳ COOLDOWN
            # =========================
            COOLDOWN_FILE=".cache/$SLUG"
            NOW=$(date +%s)

            if [ "$DEBUG_MODE" != "true" ] && [ -f "$COOLDOWN_FILE" ]; then
              LAST=$(cat "$COOLDOWN_FILE")
              if [ $((NOW - LAST)) -lt 7200 ]; then
                continue
              fi
            fi

            echo "$NOW" > "$COOLDOWN_FILE"

            # store for sorting
            echo "$CURRENT|$LEVEL|$NAME|$SLUG" >> $TMP

          done

          # =========================
          # 🏆 SORT + TOP N
          # =========================
          SORTED=$(sort -nr $TMP)

          TOTAL_ALERTS=$(echo "$SORTED" | wc -l)

          if [ "$TOTAL_ALERTS" -gt 3 ]; then
            FINAL=$(echo "$SORTED" | head -n 3)
          else
            FINAL="$SORTED"
          fi

          # =========================
          # 📦 BUILD MESSAGE
          # =========================
          MSG="🚨 Latency Alerts\n\n"

          INDEX=1
          while IFS="|" read -r LAT LEVEL NAME SLUG; do
            [ -z "$LAT" ] && continue

            MSG+="$INDEX. $LEVEL\n"
            MSG+="🌐 $NAME\n"
            MSG+="⚡ $LAT ms\n"
            MSG+="🔗 $STATUS_BASE_URL/$SLUG\n\n"

            INDEX=$((INDEX+1))
          done <<< "$FINAL"

          if [ "$INDEX" -eq 1 ]; then
            echo "alert=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "alert=true" >> $GITHUB_OUTPUT
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo -e "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Telegram
        if: steps.analyze.outputs.alert == 'true'
        run: |
          MESSAGE="${{ steps.analyze.outputs.msg }}\n🕒 $(TZ='Asia/Kolkata' date +"%d %b %Y | %I:%M %p IST")"

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "$MESSAGE" \
            --argjson thread_id ${{ secrets.ALERTS_TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
