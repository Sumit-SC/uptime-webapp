name: Telegram Uptime Summary

on:
  schedule:
    - cron: "30 2 * * *"
  push:
    paths:
      - "history/*"
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest

    steps:
      - name: Start timer
        run: echo "START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build summary
        id: build
        run: |
          REPO_URL="https://sumit.indevs.in/ping"

          SUMMARY="рџ“Љ Uptime Summary\n"
          SUMMARY+="рџ”— Dashboard: $REPO_URL\n\n"

          FILE="history/summary.json"

          TOTAL=0
          DOWN=0
          LAT_SUM=0
          LAT_COUNT=0

          OUTPUT=""

          COUNT=$(jq length "$FILE")

          for i in $(seq 0 $(($COUNT - 1))); do
            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            UPTIME=$(jq -r ".[$i].uptime" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            TOTAL=$((TOTAL+1))

            if [ "$STATUS" = "up" ]; then
              ICON="рџџў"
            else
              ICON="рџ”ґ"
              DOWN=$((DOWN+1))
            fi

            # latency
            YML_FILE="history/$SLUG.yml"
            LATENCY=""
            if [ -f "$YML_FILE" ]; then
              LATENCY=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')
            fi

            if [ -n "$LATENCY" ]; then
              LAT_SUM=$((LAT_SUM + LATENCY))
              LAT_COUNT=$((LAT_COUNT + 1))

              if [ "$LATENCY" -lt 500 ]; then
                LAT_LABEL="вљЎ $LATENCY ms (Fast)"
              elif [ "$LATENCY" -lt 1500 ]; then
                LAT_LABEL="вљ  $LATENCY ms (Moderate)"
              else
                LAT_LABEL="рџђў $LATENCY ms (Slow)"
              fi
            else
              LAT_LABEL="вЂ”"
            fi

            STATUS_URL="https://status.sumit.indevs.in/history/$SLUG"

            LINE="$ICON $NAME\n   $LAT_LABEL | Uptime: $UPTIME\n   рџ”— $STATUS_URL\n\n"

            # PRIORITIZE DOWN sites
            if [ "$STATUS" = "down" ]; then
              OUTPUT="$LINE$OUTPUT"
            else
              OUTPUT="$OUTPUT$LINE"
            fi

          done

          SUMMARY+="$OUTPUT"

          # metrics
          UP=$((TOTAL - DOWN))

          if [ "$TOTAL" -gt 0 ]; then
            HEALTH=$((UP * 100 / TOTAL))
          else
            HEALTH=0
          fi

          if [ "$LAT_COUNT" -gt 0 ]; then
            AVG_LAT=$((LAT_SUM / LAT_COUNT))
          else
            AVG_LAT=0
          fi

          # health bar
          FILLED=$((HEALTH / 20))
          EMPTY=$((5 - FILLED))

          BAR=""
          for i in $(seq 1 $FILLED); do BAR+="рџџ©"; done
          for i in $(seq 1 $EMPTY); do BAR+="в¬њ"; done

          SUMMARY+="в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\n"
          SUMMARY+="рџ“€ Health: $BAR $HEALTH%\n"
          SUMMARY+="вљЎ Avg Latency: $AVG_LAT ms\n"
          SUMMARY+="рџ”ґ Down: $DOWN / $TOTAL\n\n"
          SUMMARY+="рџ•’ $(TZ='Asia/Kolkata' date +"%d %b %Y | %I:%M %p IST")"

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Calculate runtime
        id: runtime
        run: |
          END=$(date +%s)
          echo "value=$((END - $START))s" >> $GITHUB_OUTPUT

      - name: Send Telegram message
        run: |
          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.build.outputs.message }}\n\nвЏ± Runtime: ${{ steps.runtime.outputs.value }}" \
            --argjson thread_id ${{ secrets.TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
