# ==========================================
# TELEGRAM UPTIME SUMMARY
# ==========================================
#
# Purpose:
#
# Sends a visual Telegram uptime summary
# using Upptime-generated history files.
#
# Reads:
#   history/summary.json
#   history/*.yml
#
# ==========================================
# REQUIRED GITHUB SECRETS
# ==========================================
#
# DASHBOARD_URL
#   Main uptime dashboard URL.
#   Example:
#   https://status.example.com
#
# STATUS_BASE_URL
#   Base URL for history/status pages.
#   Example:
#   https://status.example.com/history
#
# CHAT_ID
#   Telegram group/chat ID.
#   Example:
#   -1001234567890
#
# TOPIC_ID
#   Telegram forum topic/thread ID.
#   Example:
#   12
#
# SUMMARY_BOT_TOKEN
#   Telegram bot token.
#   Example:
#   123456789:AAExampleBotTokenHere
#
# SUMMARY_TIMEZONE
#   Display timezone for messages.
#   Examples:
#   Asia/Kolkata
#   Asia/Tokyo
#   UTC
#
# ==========================================
# CRON NOTES
# ==========================================
#
# GitHub Actions cron uses UTC ONLY.
#
# IST = UTC + 5:30
#
# Examples:
#
# 02:30 UTC = 08:00 AM IST
# 03:00 UTC = 08:30 AM IST
#
# Cron helper:
# https://crontab.guru/
#
# Timezone converter:
# https://www.worldtimebuddy.com/
#
# IMPORTANT:
# GitHub scheduled workflows may delay
# by several minutes during high load.
#
# ------------------------------------------
# TEST MODE (CURRENT)
# ------------------------------------------
#
# Every 5 minutes:
#
# */5 * * * *
#
# Useful because GitHub scheduled workflows
# may delay by several minutes.
#
# ------------------------------------------
# PRODUCTION MODE
# ------------------------------------------
#
# Daily 8:05 AM IST:
# IST = UTC +5:30
# 08:05 IST = 02:35 UTC
#
# Production cron:
#
# 35 2 * * *
#
# Replace the test cron with above after
# verifying scheduled workflows work.
#
# Cron helper:
# https://crontab.guru/
#

# ==========================================
# Actual Working Code ⬇️
# ==========================================


name: Telegram Upptime Summary & Stats Monitor

on:

  # ========================================
  # TEST MODE
  #
  # Every 5 minutes
  # ========================================
  schedule:
    - cron: "*/5 * * * *"

  # ========================================
  # Manual trigger
  # ========================================
  workflow_dispatch:

jobs:

  summary:
    runs-on: ubuntu-latest

    env:
      DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
      STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}
      SUMMARY_TIMEZONE: ${{ secrets.SUMMARY_TIMEZONE }}

    steps:

      # ====================================
      # Runtime timer
      # ====================================
      - name: Start timer
        run: echo "START=$(date +%s)" >> $GITHUB_ENV

      # ====================================
      # Checkout repository
      # ====================================
      - name: Checkout repo
        uses: actions/checkout@v4

      # ====================================
      # Build Telegram summary
      # ====================================
      - name: Build summary
        id: build

        run: |

          SUMMARY="📊 Upptime Monitor Summary\n\n"
          SUMMARY+="🔗 Dashboard: $DASHBOARD_URL\n\n"

          FILE="history/summary.json"

          TOTAL=0
          DOWN=0
          INDEX=1

          DOWN_BLOCK=""
          UP_BLOCK=""

          LAT_SUM=0
          LAT_COUNT=0

          SLOWEST_SITE=""
          SLOWEST_LAT=0

          MOST_UNSTABLE=""
          MOST_SPIKES=0

          COUNT=$(jq length "$FILE")

          # ==================================
          # Iterate services
          # ==================================

          for i in $(seq 0 $(($COUNT - 1))); do

            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            UPTIME=$(jq -r ".[$i].uptime" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            TOTAL=$((TOTAL + 1))

            # ==================================
            # Service state
            # ==================================

            if [ "$STATUS" = "up" ]; then
              ICON="🟢"
            else
              ICON="🔴"
              DOWN=$((DOWN + 1))
            fi

            # ==================================
            # Read latest latency
            # ==================================

            YML_FILE="history/$SLUG.yml"

            LATENCY=""

            if [ -f "$YML_FILE" ]; then
              LATENCY=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')
            fi

            # ==================================
            # Track slowest service
            # ==================================

            if [[ "$LATENCY" =~ ^[0-9]+$ ]]; then

              if [ "$LATENCY" -gt "$SLOWEST_LAT" ]; then
                SLOWEST_LAT="$LATENCY"
                SLOWEST_SITE="$NAME"
              fi

            fi

            # ==================================
            # Optional instability tracking
            #
            # Reads from latency-state.json
            # ==================================

            if [ -f "history/latency-state.json" ]; then

              SPIKES=$(jq -r \
                --arg slug "$SLUG" \
                '.[$slug].weekly_spikes // 0' \
                history/latency-state.json)

              if [ "$SPIKES" -gt "$MOST_SPIKES" ]; then
                MOST_SPIKES="$SPIKES"
                MOST_UNSTABLE="$NAME"
              fi

            fi

            # ==================================
            # Latency speed ladder
            # ==================================

            if [ "$STATUS" = "down" ]; then

              LAT_LABEL="🛑 DOWN"

            elif [ -n "$LATENCY" ]; then

              LAT_SUM=$((LAT_SUM + LATENCY))
              LAT_COUNT=$((LAT_COUNT + 1))

              if [ "$LATENCY" -lt 100 ]; then
                EMOJI="⚡"
              elif [ "$LATENCY" -lt 250 ]; then
                EMOJI="🚀"
              elif [ "$LATENCY" -lt 500 ]; then
                EMOJI="✈️"
              elif [ "$LATENCY" -lt 750 ]; then
                EMOJI="🏎️"
              elif [ "$LATENCY" -lt 1000 ]; then
                EMOJI="🚗"
              elif [ "$LATENCY" -lt 1500 ]; then
                EMOJI="🏇"
              elif [ "$LATENCY" -lt 2000 ]; then
                EMOJI="🐢"
              else
                EMOJI="🐌"
              fi

              LAT_LABEL="$EMOJI $LATENCY ms"

            else

              LAT_LABEL="—"

            fi

            # ==================================
            # Health bar
            # ==================================

            UP_NUM=$(echo "$UPTIME" | grep -o '[0-9]*' | head -1)
            UP_NUM=${UP_NUM:-0}

            FILLED=$((UP_NUM / 20))
            EMPTY=$((5 - FILLED))

            if [ "$STATUS" = "down" ]; then

              HBAR="🟥🟥🟥🟥🟥"

            else

              if [ "$UP_NUM" -ge 100 ]; then
                COLOR="🟩"
              elif [ "$UP_NUM" -ge 80 ]; then
                COLOR="🟦"
              elif [ "$UP_NUM" -ge 60 ]; then
                COLOR="🟨"
              elif [ "$UP_NUM" -ge 40 ]; then
                COLOR="🟧"
              else
                COLOR="🟥"
              fi

              HBAR=""

              for j in $(seq 1 $FILLED); do
                HBAR+="$COLOR"
              done

              for j in $(seq 1 $EMPTY); do
                HBAR+="⬜"
              done

            fi

            STATUS_URL="$STATUS_BASE_URL/$SLUG"

            # ==================================
            # Service block
            # ==================================

            BLOCK="$INDEX. $ICON $NAME\n"
            BLOCK+="   $LAT_LABEL | 📈 $HBAR | ⏱ $UPTIME\n"
            BLOCK+="   🔗 $STATUS_URL\n\n"

            if [ "$STATUS" = "down" ]; then
              DOWN_BLOCK+="$BLOCK"
            else
              UP_BLOCK+="$BLOCK"
            fi

            INDEX=$((INDEX + 1))

          done

          SUMMARY+="$DOWN_BLOCK$UP_BLOCK"

          # ==================================
          # Overall health metrics
          # ==================================

          UP=$((TOTAL - DOWN))

          if [ "$TOTAL" -gt 0 ]; then
            HEALTH=$((UP * 100 / TOTAL))
          else
            HEALTH=0
          fi

          if [ "$LAT_COUNT" -gt 0 ]; then
            AVG_LAT=$((LAT_SUM / LAT_COUNT))
          else
            AVG_LAT=0
          fi

          FILLED=$((HEALTH / 20))
          EMPTY=$((5 - FILLED))

          # ==================================
          # Health bar color
          # ==================================

          if [ "$HEALTH" -ge 100 ]; then
            COLOR="🟩"
          elif [ "$HEALTH" -ge 80 ]; then
            COLOR="🟦"
          elif [ "$HEALTH" -ge 60 ]; then
            COLOR="🟨"
          elif [ "$HEALTH" -ge 40 ]; then
            COLOR="🟧"
          else
            COLOR="🟥"
          fi

          BAR=""

          for i in $(seq 1 $FILLED); do
            BAR+="$COLOR"
          done

          for i in $(seq 1 $EMPTY); do
            BAR+="⬜"
          done

          # ==================================
          # Optional trend insights
          # ==================================

          TREND="Stable"

          if [ "$AVG_LAT" -gt 1500 ]; then
            TREND="Critical"
          elif [ "$AVG_LAT" -gt 1000 ]; then
            TREND="Degrading"
          elif [ "$AVG_LAT" -gt 500 ]; then
            TREND="Moderate"
          fi

          # ==================================
          # Time formatting
          # ==================================

          LOCAL_TIME=$(TZ="$SUMMARY_TIMEZONE" \
            date +"%d %b %Y | %I:%M %p %Z")

          UTC_TIME=$(TZ="UTC" \
            date +"%H:%M UTC")

          # ==================================
          # Final metrics block
          # ==================================

          SUMMARY+="━━━━━━━━━━━━━━━━━━\n\n"

          SUMMARY+="📈 Health: $BAR $HEALTH%\n"
          SUMMARY+="⚡ Avg Latency: $AVG_LAT ms\n"
          SUMMARY+="🔴 Down: $DOWN / $TOTAL\n"

          # ==================================
          # Extra insights
          # ==================================

          if [ -n "$SLOWEST_SITE" ]; then
            SUMMARY+="🐌 Slowest: $SLOWEST_SITE ($SLOWEST_LAT ms)\n"
          fi

          if [ "$MOST_SPIKES" -gt 0 ]; then
            SUMMARY+="🚨 Unstable: $MOST_UNSTABLE ($MOST_SPIKES spikes)\n"
          fi

          SUMMARY+="📊 Trend: $TREND\n\n"

          SUMMARY+="🕒 $LOCAL_TIME\n"
          SUMMARY+="🌍 $UTC_TIME\n"
          SUMMARY+="⏱ Runtime: $(( $(date +%s) - $START ))s"

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ====================================
      # Send Telegram message
      # ====================================
      - name: Send Telegram message

        run: |

          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.build.outputs.message }}" \
            --argjson thread_id ${{ secrets.TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
            
