name: Telegram Uptime Summary

on:
  schedule:
    # 08:00 IST = 02:30 UTC
    - cron: "30 2 * * *"
  push:
    paths:
      - "history/*.json"
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest

    steps:
      - name: Start timer
        run: echo "START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build summary
        id: build
        run: |
          REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          HISTORY_POINTS=5

          TOTAL=0
          DOWN=0
          LAT_SUM=0
          LAT_COUNT=0
          INDEX=1

          SUMMARY="📊 Uptime Summary\n\n"

          for file in history/*.json; do
            [[ "$(basename "$file")" == "summary.json" ]] && continue

            NAME=$(basename "$file" .json)

            STATUS=$(jq -r '.status' "$file")
            LATENCY=$(jq -r '.responseTime // empty' "$file")

            TOTAL=$((TOTAL+1))

            # Trend graph
            STATUSES=$(jq -r ".history[-$HISTORY_POINTS:][]?.status" "$file")
            GRAPH=""
            for s in $STATUSES; do
              if [ "$s" = "up" ]; then GRAPH+="🟩"; else GRAPH+="🟥"; fi
            done

            # Status
            if [ "$STATUS" = "up" ]; then
              ICON="🟢"
              STATUS_TEXT="UP"
            else
              ICON="🔴"
              STATUS_TEXT="DOWN"
              DOWN=$((DOWN+1))
            fi

            # Latency label
            if [ -n "$LATENCY" ] && [ "$LATENCY" != "null" ]; then
              LAT_SUM=$((LAT_SUM + LATENCY))
              LAT_COUNT=$((LAT_COUNT + 1))

              if [ "$LATENCY" -lt 500 ]; then
                LAT_LABEL="⚡ $LATENCY ms (Fast)"
              elif [ "$LATENCY" -lt 1500 ]; then
                LAT_LABEL="⚠ $LATENCY ms (Moderate)"
              else
                LAT_LABEL="🐢 $LATENCY ms (Slow)"
              fi
            else
              LAT_LABEL="🚨 No response"
            fi

            SUMMARY+="$INDEX️⃣ $ICON $NAME\n"
            SUMMARY+="   Status: $STATUS_TEXT | $LAT_LABEL | $GRAPH\n\n"

            INDEX=$((INDEX+1))
          done

          # Metrics
          UP=$((TOTAL - DOWN))
          if [ "$TOTAL" -gt 0 ]; then
            HEALTH=$((UP * 100 / TOTAL))
          else
            HEALTH=0
          fi

          if [ "$LAT_COUNT" -gt 0 ]; then
            AVG_LAT=$((LAT_SUM / LAT_COUNT))
          else
            AVG_LAT=0
          fi

          # Health bar
          FILLED=$((HEALTH / 20))
          EMPTY=$((5 - FILLED))

          BAR=""
          for i in $(seq 1 $FILLED); do BAR+="🟩"; done
          for i in $(seq 1 $EMPTY); do BAR+="⬜"; done

          SUMMARY+="━━━━━━━━━━━━━━━━━━\n\n"
          SUMMARY+="📈 Health: $BAR $HEALTH%\n"
          SUMMARY+="⚡ Avg Latency: $AVG_LAT ms\n"
          SUMMARY+="🔴 Down: $DOWN / $TOTAL\n\n"
          SUMMARY+="🔗 Dashboard: $REPO_URL\n\n"
          SUMMARY+="🕒 $(TZ='Asia/Kolkata' date +"%d %b %Y | %I:%M %p IST")"

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Calculate runtime
        id: runtime
        run: |
          END=$(date +%s)
          echo "value=$((END - $START))s" >> $GITHUB_OUTPUT

      - name: Send Telegram message (SAFE)
        run: |
          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.build.outputs.message }}\n\n⏱ Runtime: ${{ steps.runtime.outputs.value }}" \
            --argjson thread_id ${{ secrets.TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
