name: Telegram Uptime Summary

on:
  schedule:
    - cron: "0 3 * * *"   # 02:30 UTC = 08:00 IST
  workflow_dispatch:

jobs:
  summary:
    runs-on: ubuntu-latest

    env:
      DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
      STATUS_BASE_URL: ${{ secrets.STATUS_BASE_URL }}
      SUMMARY_TIMEZONE: ${{ secrets.SUMMARY_TIMEZONE }}

    steps:
      - name: Start timer
        run: echo "START=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build summary
        id: build
        run: |
          SUMMARY="рџ“Љ Uptime Summary\n\n"
          SUMMARY+="рџ”— Dashboard: $DASHBOARD_URL\n\n"

          FILE="history/summary.json"

          TOTAL=0
          DOWN=0
          INDEX=1

          DOWN_BLOCK=""
          UP_BLOCK=""

          COUNT=$(jq length "$FILE")

          LAT_SUM=0
          LAT_COUNT=0

          for i in $(seq 0 $(($COUNT - 1))); do

            NAME=$(jq -r ".[$i].name" "$FILE")
            STATUS=$(jq -r ".[$i].status" "$FILE")
            UPTIME=$(jq -r ".[$i].uptime" "$FILE")
            SLUG=$(jq -r ".[$i].slug" "$FILE")

            TOTAL=$((TOTAL+1))

            if [ "$STATUS" = "up" ]; then
              ICON="рџџұ"
            else
              ICON="рџ”ө"
              DOWN=$((DOWN+1))
            fi

            # =========================
            # LATENCY
            # =========================

            YML_FILE="history/$SLUG.yml"
            LATENCY=""

            if [ -f "$YML_FILE" ]; then
              LATENCY=$(grep 'responseTime:' "$YML_FILE" | awk '{print $2}')
            fi

            if [ "$STATUS" = "down" ]; then

              LAT_LABEL="рџ›‘ DOWN"

            elif [ -n "$LATENCY" ]; then

              LAT_SUM=$((LAT_SUM + LATENCY))
              LAT_COUNT=$((LAT_COUNT + 1))

              if [ "$LATENCY" -lt 100 ]; then
                EMOJI="вљҰ"
              elif [ "$LATENCY" -lt 250 ]; then
                EMOJI="рџљЂ"
              elif [ "$LATENCY" -lt 500 ]; then
                EMOJI="вњ€пёЏ"
              elif [ "$LATENCY" -lt 750 ]; then
                EMOJI="рџЏҺпёЏ"
              elif [ "$LATENCY" -lt 1000 ]; then
                EMOJI="рџљ—"
              elif [ "$LATENCY" -lt 1500 ]; then
                EMOJI="рџЏ‡"
              elif [ "$LATENCY" -lt 2000 ]; then
                EMOJI="рџђұ"
              else
                EMOJI="рџђЊ"
              fi

              LAT_LABEL="$EMOJI $LATENCY ms"

            else
              LAT_LABEL="вЂ”"
            fi

            # =========================
            # HEALTH BAR
            # =========================

            UP_NUM=$(echo "$UPTIME" | grep -o '[0-9]*' | head -1)
            UP_NUM=${UP_NUM:-0}

            FILLED=$((UP_NUM / 20))
            EMPTY=$((5 - FILLED))

            if [ "$STATUS" = "down" ]; then

              HBAR="рџџӨрџџӨрџџӨрџџӨрџџӨ"

            else

              if [ "$UP_NUM" -ge 100 ]; then
                COLOR="рџџ©"
              elif [ "$UP_NUM" -ge 80 ]; then
                COLOR="рџџ¦"
              elif [ "$UP_NUM" -ge 60 ]; then
                COLOR="рџџЁ"
              elif [ "$UP_NUM" -ge 40 ]; then
                COLOR="рџџ§"
              else
                COLOR="рџџӨ"
              fi

              HBAR=""

              for j in $(seq 1 $FILLED); do
                HBAR+="$COLOR"
              done

              for j in $(seq 1 $EMPTY); do
                HBAR+="в¬њ"
              done
            fi

            STATUS_URL="$STATUS_BASE_URL/$SLUG"

            BLOCK="$INDEX. $ICON $NAME\n"
            BLOCK+="   $LAT_LABEL | рџ“€ $HBAR | вЏ± $UPTIME\n"
            BLOCK+="   рџ”— $STATUS_URL\n\n"

            if [ "$STATUS" = "down" ]; then
              DOWN_BLOCK+="$BLOCK"
            else
              UP_BLOCK+="$BLOCK"
            fi

            INDEX=$((INDEX+1))

          done

          SUMMARY+="$DOWN_BLOCK$UP_BLOCK"

          # =========================
          # OVERALL METRICS
          # =========================

          UP=$((TOTAL - DOWN))

          if [ "$TOTAL" -gt 0 ]; then
            HEALTH=$((UP * 100 / TOTAL))
          else
            HEALTH=0
          fi

          if [ "$LAT_COUNT" -gt 0 ]; then
            AVG_LAT=$((LAT_SUM / LAT_COUNT))
          else
            AVG_LAT=0
          fi

          if [ "$AVG_LAT" -lt 100 ]; then
            LAT_ICON="вљҰ"
          elif [ "$AVG_LAT" -lt 250 ]; then
            LAT_ICON="рџљЂ"
          elif [ "$AVG_LAT" -lt 500 ]; then
            LAT_ICON="вњ€пёЏ"
          elif [ "$AVG_LAT" -lt 750 ]; then
            LAT_ICON="рџЏҺпёЏ"
          elif [ "$AVG_LAT" -lt 1000 ]; then
            LAT_ICON="рџљ—"
          elif [ "$AVG_LAT" -lt 1500 ]; then
            LAT_ICON="рџЏ‡"
          elif [ "$AVG_LAT" -lt 2000 ]; then
            LAT_ICON="рџђұ"
          else
            LAT_ICON="рџђЊ"
          fi

          FILLED=$((HEALTH / 20))
          EMPTY=$((5 - FILLED))

          if [ "$HEALTH" -ge 100 ]; then
            COLOR="рџџ©"
          elif [ "$HEALTH" -ge 80 ]; then
            COLOR="рџџ¦"
          elif [ "$HEALTH" -ge 60 ]; then
            COLOR="рџџЁ"
          elif [ "$HEALTH" -ge 40 ]; then
            COLOR="рџџ§"
          else
            COLOR="рџџӨ"
          fi

          BAR=""

          for i in $(seq 1 $FILLED); do
            BAR+="$COLOR"
          done

          for i in $(seq 1 $EMPTY); do
            BAR+="в¬њ"
          done

          LOCAL_TIME=$(TZ="$SUMMARY_TIMEZONE" date +"%d %b %Y | %I:%M %p %Z")
          UTC_TIME=$(TZ="UTC" date +"%H:%M UTC")

          SUMMARY+="в”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\n\n"
          SUMMARY+="рџ“€ Health: $BAR $HEALTH%\n"
          SUMMARY+="вљҰ Avg Latency: $LAT_ICON $AVG_LAT ms\n"
          SUMMARY+="рџ”ө Down: $DOWN / $TOTAL\n\n"

          SUMMARY+="рџ•’ $LOCAL_TIME\n"
          SUMMARY+="рџЊҚ $UTC_TIME\n"
          SUMMARY+="вЏ± Runtime: $(( $(date +%s) - $START ))s"

          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo -e "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Telegram message
        run: |
          PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.CHAT_ID }}" \
            --arg text "${{ steps.build.outputs.message }}" \
            --argjson thread_id ${{ secrets.TOPIC_ID }} \
            '{
              chat_id: $chat_id,
              message_thread_id: $thread_id,
              text: $text,
              disable_web_page_preview: true
            }')

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.SUMMARY_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"